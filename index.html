<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Premium Messenger - Floating Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --me-bubble: #4338ca;
            --other-bubble: #334155;
            --private-mode: #be185d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background: #cbd5e1;
            background-image: radial-gradient(#94a3b8 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* NÚT CHAT HEAD (FLOATING BUTTON) */
        #chat-launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.5);
            z-index: 2000;
            transition: 0.3s;
        }

        #chat-launcher:hover {
            transform: scale(1.1);
        }

        #chat-launcher svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        /* KHUNG CHAT TO (FULL-SIZE CONTAINER) */
        #app-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #app {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: var(--surface);
            border-radius: 30px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-item.selected {
            background: var(--private-mode);
            color: white;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        #chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0b1120;
        }

        #messages-container {
            position: relative;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #messages {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #typing-indicator {
            padding: 0 25px 15px 50px;
            font-size: 0.85em;
            color: #10b981;
            font-style: italic;
            display: none;
        }

        /* BONG BÓNG CHAT */
        .bubble-row {
            display: flex;
            width: 100%;
        }

        .bubble-row.me {
            justify-content: flex-end;
        }

        .bubble-row.other {
            justify-content: flex-start;
        }

        .bubble-row.sys {
            justify-content: center;
        }

        .bubble {
            width: fit-content;
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 0.95em;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .me .bubble {
            background: var(--me-bubble);
            border-bottom-right-radius: 4px;
            color: white;
            margin-right: 8px;
        }

        .me .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: -6px;
            width: 15px;
            height: 15px;
            background: var(--me-bubble);
            clip-path: polygon(0 0, 0% 100%, 100% 100%);
        }

        .other .bubble {
            background: var(--other-bubble);
            border-bottom-left-radius: 4px;
            margin-left: 8px;
        }

        .other .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -6px;
            width: 15px;
            height: 15px;
            background: var(--other-bubble);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .private .bubble {
            background: var(--private-mode) !important;
        }

        .bubble-meta {
            font-size: 0.75em;
            color: var(--text-dim);
            margin-bottom: 4px;
            margin-left: 12px;
            margin-right: 12px;
        }

        .me .bubble-meta {
            text-align: right;
        }

        /* Controls */
        #control-panel {
            padding: 20px 25px;
            background: #1e293b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        #private-notice {
            background: var(--private-mode);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 12px;
            display: none;
            width: fit-content;
        }

        #input-box {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 14px 20px;
            border-radius: 15px;
            color: white;
            outline: none;
        }

        #send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
            height: 48px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
        }

        #emoji-picker {
            position: absolute;
            bottom: 95px;
            left: 25px;
            background: var(--surface);
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 100;
        }

        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #close-widget {
            position: absolute;
            top: 25px;
            right: 25px;
            cursor: pointer;
            font-size: 1.5em;
            opacity: 0.5;
            transition: 0.3s;
            z-index: 3001;
        }

        #close-widget:hover {
            opacity: 1;
            transform: rotate(90deg);
        }
    </style>
</head>

<body>

    <!-- MÔ PHỎNG TRANG WEB ĐANG CÓ GÌ ĐÓ -->
    <div style="padding: 100px; text-align: center; color: #1e293b">
        <h1>Trang Web của Quang</h1>
        <p>Bấm vào bòng bóng chat để bắt đầu thảo luận công khai hoặc riêng tư!</p>
    </div>

    <!-- NÚT CHAT HEAD -->
    <div id="chat-launcher" onclick="toggleChat()">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
        </svg>
    </div>

    <!-- CỬA SỔ CHAT TO (WIDGET TO) -->
    <div id="app-wrapper">
        <div id="app">
            <div id="close-widget" onclick="toggleChat()">✖</div>

            <div id="login-screen">
                <div
                    style="text-align:center; width: 400px; padding: 50px; background: rgba(0,0,0,0.2); border-radius: 30px;">
                    <h2>💬 Tham gia ngay</h2>
                    <input type="text" id="username-in" placeholder="Họ tên của bạn..."
                        style="width: 100%; padding: 15px; margin: 25px 0; border-radius: 12px; background: #0f172a; color: white; border: 1px solid #334155;">
                    <button onclick="login()"
                        style="width: 100%; height: 50px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Vào
                        phòng Chat</button>
                </div>
            </div>

            <div id="sidebar">
                <div class="sidebar-header">BẠN BÈ ONLINE</div>
                <div id="user-list"></div>
            </div>

            <div id="chat-main">
                <div id="messages-container">
                    <div id="messages"></div>
                    <div id="typing-indicator"></div>
                </div>

                <div id="emoji-picker">
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('😊')">😊</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('😂')">😂</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('❤️')">❤️</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('👍')">👍</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🔥')">🔥</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🎉')">🎉</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🚀')">🚀</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('✅')">✅</span>
                </div>

                <div id="control-panel">
                    <div id="private-notice">🔒 ĐANG CHAT RIÊNG VỚI: <span id="target-name"></span></div>
                    <div id="input-box">
                        <span onclick="toggleEmoji()" style="cursor:pointer; font-size: 1.8em;">😊</span>
                        <input type="text" id="msg-input" placeholder="Nhập nội dung tin nhắn..." oninput="sendTyping()"
                            onkeypress="if(event.key==='Enter') send()">
                        <button id="send-btn" onclick="send()">Gửi đi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="ting" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        let ws, myName = "", targetUser = null, typingTimer;
        // KIỂM TRA LẠI LINK RENDER CỦA BẠN
        const URL = "wss://my-chat-app-2a1d.onrender.com";

        function toggleChat() {
            const wrapper = document.getElementById('app-wrapper');
            wrapper.style.display = (wrapper.style.display === 'flex') ? 'none' : 'flex';
        }

        function login() {
            myName = document.getElementById('username-in').value.trim();
            if (myName) {
                ws = new WebSocket(URL);
                ws.onopen = () => ws.send("LOGIN:" + myName);
                ws.onmessage = (e) => handleMessage(e.data);
            }
        }

        function handleMessage(data) {
            if (data === "LOGIN_SUCCESS") {
                document.getElementById('login-screen').style.display = 'none';
            } else if (data.startsWith("CHAT:")) {
                addBubble(data.substring(5), false);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("PRIVATE_CHAT:")) {
                addBubble(data.substring(13), true);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("UPDATE_USER_LIST:")) {
                updateList(data.substring(17));
            } else if (data.startsWith("SYSTEM_TYPING:")) {
                showTyping(data.substring(14));
            }
        }

        function updateList(list) {
            const users = list.split(',').filter(u => u && u !== myName);
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item' + (targetUser === u ? ' selected' : '');
                div.innerHTML = `<div class="status-dot"></div> ${u}`;
                div.onclick = () => {
                    targetUser = (targetUser === u) ? null : u;
                    const notice = document.getElementById('private-notice');
                    if (targetUser) {
                        notice.style.display = 'block';
                        document.getElementById('target-name').innerText = targetUser;
                    } else notice.style.display = 'none';
                    updateList(list);
                };
                container.appendChild(div);
            });
        }

        function addBubble(msg, isPrivate) {
            const container = document.getElementById('messages');
            const scrollArea = document.getElementById('messages-container');
            const row = document.createElement('div');

            let time = "", sender = "Hệ thống", body = msg;
            const m = msg.match(/^\[(.*?)\] \[(.*?)\]: (.*)/);
            if (m) { time = m[1]; sender = m[2]; body = m[3]; }

            row.className = 'bubble-row ' + (sender === myName ? 'me' : (sender === "Hệ thống" ? 'sys' : 'other'));
            if (isPrivate) row.classList.add('private');

            const alignStyle = (sender === myName) ? 'align-items: flex-end;' : 'align-items: flex-start;';

            if (sender === "Hệ thống") {
                row.innerHTML = `<div class="bubble">${body}</div>`;
            } else {
                row.innerHTML = `<div style="display:flex; flex-direction:column; ${alignStyle} max-width: 80%;">
                    <div class="bubble-meta">${sender} • ${time}</div>
                    <div class="bubble">${body}</div>
                </div>`;
            }

            container.appendChild(row);
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;
            if (targetUser) ws.send("PRIVATE:" + targetUser + "|" + val);
            else ws.send("MSG:" + val);
            input.value = "";
            document.getElementById('emoji-picker').style.display = 'none';
        }

        function sendTyping() { ws.send("TYPING:1"); }
        function showTyping(u) {
            const indicator = document.getElementById('typing-indicator');
            indicator.innerText = u + " đang soạn tin nhắn...";
            indicator.style.display = 'block';
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => indicator.style.display = 'none', 2000);
        }
        function toggleEmoji() {
            const p = document.getElementById('emoji-picker');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }
        function addEmoji(e) { document.getElementById('msg-input').value += e; document.getElementById('msg-input').focus(); }
    </script>
</body>

</html>
