<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Premium Chat - Light Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0084ff;
            /* Xanh Messenger */
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-main: #1c1e21;
            --text-dim: #65676b;
            --me-bubble: #0084ff;
            --other-bubble: #e4e6eb;
            --private-mode: #ff4d4d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background: #e9ebee;
            height: 100vh;
            overflow: hidden;
        }

        /* NÚT CHAT HEAD */
        #chat-launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 132, 255, 0.3);
            z-index: 2000;
            transition: 0.3s;
        }

        #chat-launcher svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        /* KHUNG CHAT TO (TRẮNG SÁNG) */
        #app-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            z-index: 1999;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #app {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            position: relative;
            color: var(--text-main);
        }

        #sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: 600;
            border-bottom: 1px solid #eee;
            color: #1c1e21;
            font-size: 1.1em;
        }

        #user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 5px;
        }

        .user-item:hover {
            background: #f2f2f2;
        }

        .user-item.selected {
            background: #fee2e2;
            color: #dc2626;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #31a24c;
            border-radius: 50%;
            border: 2px solid white;
        }

        #chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #fff;
        }

        #messages-container {
            position: relative;
            flex: 1;
            overflow-y: auto;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        #messages {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #typing-indicator {
            padding: 5px 25px;
            font-size: 0.85em;
            color: #31a24c;
            display: none;
        }

        /* BONG BÓNG CHAT SÁNG */
        .bubble-row {
            display: flex;
            width: 100%;
        }

        .bubble-row.me {
            justify-content: flex-end;
        }

        .bubble-row.other {
            justify-content: flex-start;
        }

        .bubble-row.sys {
            justify-content: center;
            margin: 10px 0;
        }

        .bubble {
            width: fit-content;
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95em;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* Tin nhắn của mình */
        .me .bubble {
            background: var(--me-bubble);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 4px rgba(0, 132, 255, 0.2);
        }

        .me .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: -5px;
            width: 12px;
            height: 12px;
            background: var(--me-bubble);
            clip-path: polygon(0 0, 0% 100%, 100% 100%);
        }

        /* Tin nhắn bạn bè */
        .other .bubble {
            background: var(--other-bubble);
            color: #050505;
            border-bottom-left-radius: 4px;
        }

        .other .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -5px;
            width: 12px;
            height: 12px;
            background: var(--other-bubble);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .sys .bubble {
            background: #f0f2f5;
            color: #65676b;
            font-size: 0.8em;
            border-radius: 10px;
            padding: 4px 12px;
        }

        .private .bubble {
            background: #ff4d4d !important;
            color: white !important;
        }

        .private .bubble::after {
            background: #ff4d4d !important;
        }

        .bubble-meta {
            font-size: 0.75em;
            color: #65676b;
            margin-bottom: 2px;
            margin-left: 10px;
            margin-right: 10px;
        }

        .me .bubble-meta {
            text-align: right;
        }

        /* Controls Panel */
        #control-panel {
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid #eee;
        }

        #private-notice {
            background: #fee2e2;
            color: #dc2626;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 10px;
            display: none;
            width: fit-content;
            font-weight: 600;
        }

        #input-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            background: #f0f2f5;
            border: none;
            padding: 12px 18px;
            border-radius: 20px;
            color: #050505;
            outline: none;
            font-size: 0.95em;
        }

        #send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        #emoji-picker {
            position: absolute;
            bottom: 85px;
            left: 20px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 100;
        }

        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #close-widget {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.2em;
            color: #65676b;
            z-index: 3001;
        }
    </style>
</head>

<body>

    <!-- NỀN TRANG WEB SÁNG -->
    <div style="padding: 100px; text-align: center; color: #64748b">
        <h1>Welcome to My Portal</h1>
        <p>Bấm vào nút chat xanh phía dưới để trò chuyện cùng mọi người nhé!</p>
    </div>

    <!-- NÚT CHAT LAUNCHER -->
    <div id="chat-launcher" onclick="toggleChat()">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
        </svg>
    </div>

    <!-- CỬA SỔ CHAT LIGHT MODE -->
    <div id="app-wrapper">
        <div id="app">
            <div id="close-widget" onclick="toggleChat()">✖ Đóng</div>

            <div id="login-screen">
                <div
                    style="text-align:center; width: 350px; padding: 40px; border: 1px solid #eee; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
                    <h2 style="color:var(--primary); margin-top:0">CPS Messenger</h2>
                    <p style="color:#65676b; font-size:0.9em">Nhập tên của bạn để bắt đầu</p>
                    <input type="text" id="username-in" placeholder="Họ và tên..."
                        style="width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; background: #f0f2f5; border: 1px solid #ddd; outline: none;">
                    <button onclick="login()"
                        style="width: 100%; height: 45px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600;">Vào
                        Chat</button>
                </div>
            </div>

            <div id="sidebar">
                <div class="sidebar-header">Người dùng Online</div>
                <div id="user-list"></div>
            </div>

            <div id="chat-main">
                <div id="messages-container">
                    <div id="messages"></div>
                    <div id="typing-indicator"></div>
                </div>

                <div id="emoji-picker">
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('😊')">😊</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('😂')">😂</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('❤️')">❤️</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('👍')">👍</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🔥')">🔥</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🎉')">🎉</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🚀')">🚀</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('😘')">😘</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('🤩')">🤩</span>
                    <span style="cursor:pointer; font-size:1.5em" onclick="addEmoji('😎')">😎</span>
                </div>

                <div id="control-panel">
                    <div id="private-notice">🔒 Chat riêng với: <span id="target-name"></span></div>
                    <div id="input-box">
                        <span onclick="toggleEmoji()" style="cursor:pointer; font-size: 1.6em;">😊</span>
                        <input type="text" id="msg-input" placeholder="Aa" oninput="sendTyping()"
                            onkeypress="if(event.key==='Enter') send()">
                        <button id="send-btn" onclick="send()">Gửi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="ting" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        let ws, myName = "", targetUser = null, typingTimer;
        const URL = "wss://my-chat-app-2a1d.onrender.com";

        function toggleChat() {
            const wrapper = document.getElementById('app-wrapper');
            wrapper.style.display = (wrapper.style.display === 'flex') ? 'none' : 'flex';
        }

        function login() {
            myName = document.getElementById('username-in').value.trim();
            if (myName) {
                ws = new WebSocket(URL);
                ws.onopen = () => ws.send("LOGIN:" + myName);
                ws.onmessage = (e) => handleMessage(e.data);
            }
        }

        function handleMessage(data) {
            if (data === "LOGIN_SUCCESS") {
                document.getElementById('login-screen').style.display = 'none';
            } else if (data.startsWith("CHAT:")) {
                addBubble(data.substring(5), false);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("PRIVATE_CHAT:")) {
                addBubble(data.substring(13), true);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("UPDATE_USER_LIST:")) {
                updateList(data.substring(17));
            } else if (data.startsWith("SYSTEM_TYPING:")) {
                showTyping(data.substring(14));
            }
        }

        function updateList(list) {
            const users = list.split(',').filter(u => u && u !== myName);
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item' + (targetUser === u ? ' selected' : '');
                div.innerHTML = `<div class="status-dot"></div> <span style="flex:1">${u}</span>`;
                div.onclick = () => {
                    targetUser = (targetUser === u) ? null : u;
                    const notice = document.getElementById('private-notice');
                    if (targetUser) {
                        notice.style.display = 'block';
                        document.getElementById('target-name').innerText = targetUser;
                    } else notice.style.display = 'none';
                    updateList(list);
                };
                container.appendChild(div);
            });
        }

        function addBubble(msg, isPrivate) {
            const container = document.getElementById('messages');
            const scrollArea = document.getElementById('messages-container');
            const row = document.createElement('div');

            let time = "", sender = "System", body = msg;
            const m = msg.match(/^\[(.*?)\] \[(.*?)\]: (.*)/);
            if (m) { time = m[1]; sender = m[2]; body = m[3]; }

            row.className = 'bubble-row ' + (sender === myName ? 'me' : (sender === "System" ? 'sys' : 'other'));
            if (isPrivate) row.classList.add('private');

            const alignStyle = (sender === myName) ? 'align-items: flex-end;' : 'align-items: flex-start;';

            if (sender === "System") {
                row.innerHTML = `<div class="bubble">${body}</div>`;
            } else {
                row.innerHTML = `<div style="display:flex; flex-direction:column; ${alignStyle} max-width: 80%;">
                    <div class="bubble-meta">${sender} • ${time}</div>
                    <div class="bubble">${body}</div>
                </div>`;
            }

            container.appendChild(row);
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;
            if (targetUser) ws.send("PRIVATE:" + targetUser + "|" + val);
            else ws.send("MSG:" + val);
            input.value = "";
            document.getElementById('emoji-picker').style.display = 'none';
        }

        function sendTyping() { ws.send("TYPING:1"); }
        function showTyping(u) {
            const indicator = document.getElementById('typing-indicator');
            indicator.innerText = u + " đang soạn tin nhắn...";
            indicator.style.display = 'block';
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => indicator.style.display = 'none', 2000);
        }
        function toggleEmoji() {
            const p = document.getElementById('emoji-picker');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }
        function addEmoji(e) { document.getElementById('msg-input').value += e; document.getElementById('msg-input').focus(); }
    </script>
</body>

</html>
