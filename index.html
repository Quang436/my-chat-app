<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Premium Messenger - Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --me-bubble: #4338ca;
            --other-bubble: #334155;
            --private-mode: #be185d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 95%;
            max-width: 1100px;
            height: 90vh;
            background: var(--surface);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        #sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.1);
        }

        #user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-item.selected {
            background: var(--private-mode);
            color: white;
            box-shadow: 0 4px 10px rgba(190, 24, 93, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        #chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0b1120;
        }

        #messages-container {
            position: relative;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #messages {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #typing-indicator {
            padding: 0 25px 15px 50px;
            font-size: 0.85em;
            color: #10b981;
            font-style: italic;
            display: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .bubble-row {
            display: flex;
            width: 100%;
        }

        .bubble-row.me {
            justify-content: flex-end;
        }

        .bubble-row.other {
            justify-content: flex-start;
        }

        .bubble-row.sys {
            justify-content: center;
            margin: 10px 0;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 0.95em;
            position: relative;
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .me .bubble {
            background: var(--me-bubble);
            border-bottom-right-radius: 4px;
            color: white;
            margin-right: 8px;
        }

        .me .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: -6px;
            width: 15px;
            height: 15px;
            background: var(--me-bubble);
            clip-path: polygon(0 0, 0% 100%, 100% 100%);
        }

        .other .bubble {
            background: var(--other-bubble);
            border-bottom-left-radius: 4px;
            margin-left: 8px;
        }

        .other .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -6px;
            width: 15px;
            height: 15px;
            background: var(--other-bubble);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        .sys .bubble {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            font-size: 0.8em;
            border-radius: 10px;
            padding: 5px 15px;
            box-shadow: none;
        }

        .private .bubble {
            background: var(--private-mode) !important;
            box-shadow: 0 0 20px rgba(190, 24, 93, 0.4);
        }

        .private .bubble::after {
            background: var(--private-mode) !important;
        }

        .bubble-meta {
            font-size: 0.7em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .me .bubble-meta {
            text-align: right;
            margin-right: 12px;
        }

        .other .bubble-meta {
            margin-left: 12px;
        }

        /* Control Panel */
        #control-panel {
            padding: 20px 25px;
            background: #1e293b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        #private-notice {
            background: var(--private-mode);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 12px;
            display: none;
            width: fit-content;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        #input-box {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 14px 20px;
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        #msg-input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            height: 48px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
        }

        /* BẢNG EMOJI ĐÃ CHUYỂN SANG TRÁI */
        #emoji-picker {
            position: absolute;
            bottom: 95px;
            left: 25px;
            background: var(--surface);
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 100;
        }

        .emoji-item {
            cursor: pointer;
            font-size: 1.5em;
            transition: 0.2s;
        }

        .emoji-item:hover {
            transform: scale(1.3);
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div
            style="background: var(--surface); padding: 50px; border-radius: 30px; text-align: center; width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
            <h1 style="margin-top:0">CPS Chat</h1>
            <p style="color: var(--text-dim)">Kết nối mọi lúc, mọi nơi</p>
            <input type="text" id="username-in" placeholder="Họ tên của bạn..."
                style="width: 100%; padding: 15px; margin: 25px 0; border-radius: 12px; border: 1px solid #334155; background: #0b1120; color: white; outline: none;">
            <button onclick="login()" style="width: 100%; font-size: 1.1em;">Bắt đầu trò chuyện</button>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="sidebar-header">Đang Online</div>
            <div id="user-list"></div>
        </div>
        <div id="chat-main">
            <div id="messages-container">
                <div id="messages"></div>
                <div id="typing-indicator"></div>
            </div>

            <div id="emoji-picker">
                <span class="emoji-item" onclick="addEmoji('😊')">😊</span>
                <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
                <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('🎉')">🎉</span>
                <span class="emoji-item" onclick="addEmoji('🤔')">🤔</span>
                <span class="emoji-item" onclick="addEmoji('✨')">✨</span>
                <span class="emoji-item" onclick="addEmoji('🚀')">🚀</span>
                <span class="emoji-item" onclick="addEmoji('😍')">😍</span>
            </div>

            <div id="control-panel">
                <div id="private-notice">🔒 CHẾ ĐỘ THÌ THẦM: <span id="target-name"></span></div>
                <div id="input-box">
                    <span onclick="toggleEmoji()" id="emoji-toggle"
                        style="cursor:pointer; font-size: 1.8em; filter: grayscale(1);">😊</span>
                    <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." autocomplete="off"
                        oninput="sendTyping()" onkeypress="if(event.key==='Enter') send()">
                    <button id="send-btn" onclick="send()">Gửi đi</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="ting" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        let ws, myName = "", targetUser = null, typingTimer;
        const URL = "wss://my-chat-app-2a1d.onrender.com";

        function login() {
            myName = document.getElementById('username-in').value.trim();
            if (myName) {
                ws = new WebSocket(URL);
                ws.onopen = () => ws.send("LOGIN:" + myName);
                ws.onmessage = (e) => handleMessage(e.data);
                ws.onclose = () => alert("Mất kết nối server!");
            }
        }

        function handleMessage(data) {
            if (data === "LOGIN_SUCCESS") {
                document.getElementById('login-screen').style.display = 'none';
            } else if (data.startsWith("CHAT:")) {
                addBubble(data.substring(5), false);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("PRIVATE_CHAT:")) {
                addBubble(data.substring(13), true);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("UPDATE_USER_LIST:")) {
                updateList(data.substring(17));
            } else if (data.startsWith("SYSTEM_TYPING:")) {
                showTyping(data.substring(14));
            }
        }

        function updateList(list) {
            const users = list.split(',').filter(u => u && u !== myName);
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item' + (targetUser === u ? ' selected' : '');
                div.innerHTML = `<div class="status-dot"></div> ${u}`;
                div.onclick = () => {
                    targetUser = (targetUser === u) ? null : u;
                    updateUI();
                    updateList(list);
                };
                container.appendChild(div);
            });
        }

        function updateUI() {
            const notice = document.getElementById('private-notice');
            const btn = document.getElementById('send-btn');
            if (targetUser) {
                notice.style.display = 'block';
                document.getElementById('target-name').innerText = targetUser;
                btn.style.background = 'var(--private-mode)';
            } else {
                notice.style.display = 'none';
                btn.style.background = 'var(--primary)';
            }
        }

        function addBubble(msg, isPrivate) {
            const container = document.getElementById('messages');
            const scrollArea = document.getElementById('messages-container');
            const row = document.createElement('div');

            let time = "", sender = "Hệ thống", body = msg;
            const m = msg.match(/^\[(.*?)\] \[(.*?)\]: (.*)/);
            if (m) { time = m[1]; sender = m[2]; body = m[3]; }

            row.className = 'bubble-row ' + (sender === myName ? 'me' : (sender === "Hệ thống" ? 'sys' : 'other'));
            if (isPrivate) row.classList.add('private');

            if (sender === "Hệ thống") {
                row.innerHTML = `<div class="bubble">${body}</div>`;
            } else {
                row.innerHTML = `<div style="display:flex; flex-direction:column; max-width:75%">
                    <div class="bubble-meta">${sender} • ${time}</div>
                    <div class="bubble">${body}</div>
                </div>`;
            }

            container.appendChild(row);
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;
            if (targetUser) ws.send("PRIVATE:" + targetUser + "|" + val);
            else ws.send("MSG:" + val);
            input.value = "";
            document.getElementById('emoji-picker').style.display = 'none';
            document.getElementById('emoji-toggle').style.filter = 'grayscale(1)';
        }

        function sendTyping() { ws.send("TYPING:1"); }
        function showTyping(u) {
            const indicator = document.getElementById('typing-indicator');
            const scrollArea = document.getElementById('messages-container');
            indicator.innerText = u + " đang soạn tin nhắn...";
            indicator.style.display = 'block';
            scrollArea.scrollTop = scrollArea.scrollHeight;
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => indicator.style.display = 'none', 2000);
        }
        function toggleEmoji() {
            const p = document.getElementById('emoji-picker');
            const toggle = document.getElementById('emoji-toggle');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
            toggle.style.filter = (p.style.display === 'grid') ? 'grayscale(0)' : 'grayscale(1)';
        }
        function addEmoji(e) { document.getElementById('msg-input').value += e; document.getElementById('msg-input').focus(); }
    </script>
</body>

</html>
