<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Premium Messenger - Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --me-bubble: #4f46e5;
            --other-bubble: #334155;
            --private-mode: #db2777;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 95%;
            max-width: 1100px;
            height: 90vh;
            background: var(--surface);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-item.selected {
            background: var(--private-mode);
            color: white;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        /* QUAN TRỌNG: Thêm position: relative vào đây */
        #chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble-row {
            display: flex;
            width: 100%;
            margin-bottom: 5px;
        }

        .bubble-row.me {
            justify-content: flex-end;
        }

        .bubble-row.other {
            justify-content: flex-start;
        }

        .bubble-row.sys {
            justify-content: center;
            opacity: 0.7;
            font-size: 0.8em;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95em;
            position: relative;
        }

        .me .bubble {
            background: var(--me-bubble);
            border-bottom-right-radius: 4px;
        }

        .other .bubble {
            background: var(--other-bubble);
            border-bottom-left-radius: 4px;
        }

        .private .bubble {
            background: var(--private-mode) !important;
            box-shadow: 0 0 15px rgba(219, 39, 119, 0.4);
        }

        .bubble-meta {
            font-size: 0.7em;
            color: var(--text-dim);
            margin-bottom: 3px;
        }

        .me .bubble-meta {
            text-align: right;
        }

        #control-panel {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        #private-notice {
            background: var(--private-mode);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 10px;
            display: none;
            width: fit-content;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        #input-box {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* BẢNG EMOJI */
        #emoji-picker {
            position: absolute;
            bottom: 85px;
            right: 20px;
            background: var(--surface);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .emoji-item {
            cursor: pointer;
            font-size: 1.4em;
            transition: 0.2s;
        }

        .emoji-item:hover {
            transform: scale(1.3);
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div style="background: var(--surface); padding: 40px; border-radius: 24px; text-align: center; width: 350px;">
            <h2 style="margin-top:0">Đăng nhập Chat</h2>
            <input type="text" id="username-in" placeholder="Nhập tên của bạn..."
                style="width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            <button onclick="login()" style="width: 100%;">Bắt đầu ngay</button>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="sidebar-header">Bạn bè Online</div>
            <div id="user-list"></div>
            <div id="typing-box" style="padding: 10px; color: #10b981; font-size: 0.8em; min-height: 40px;"></div>
        </div>
        <div id="chat-main">
            <div id="messages"></div>

            <div id="emoji-picker">
                <span class="emoji-item" onclick="addEmoji('😊')">😊</span>
                <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
                <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('🎉')">🎉</span>
                <span class="emoji-item" onclick="addEmoji('🤔')">🤔</span>
                <span class="emoji-item" onclick="addEmoji('✨')">✨</span>
                <span class="emoji-item" onclick="addEmoji('🚀')">🚀</span>
                <span class="emoji-item" onclick="addEmoji('😍')">😍</span>
            </div>

            <div id="control-panel">
                <div id="private-notice">🔒 Đang chat riêng với: <span id="target-name"></span> (Bấm lại để thoát)</div>
                <div id="input-box">
                    <span onclick="toggleEmoji()" id="emoji-toggle"
                        style="cursor:pointer; font-size: 1.6em; filter: grayscale(1); transition: 0.3s;">😊</span>
                    <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." oninput="sendTyping()"
                        onkeypress="if(event.key==='Enter') send()">
                    <button id="send-btn" onclick="send()">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="ting" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        let ws, myName = "", targetUser = null, typingTimer;
        // HÃY ĐẢM BẢO LINK NÀY LÀ CỦA RENDER BẠN ĐANG CHẠY
        const URL = "wss://my-chat-app-2a1d.onrender.com";

        function login() {
            myName = document.getElementById('username-in').value.trim();
            if (myName) {
                ws = new WebSocket(URL);
                ws.onopen = () => ws.send("LOGIN:" + myName);
                ws.onmessage = (e) => handleMessage(e.data);
            }
        }

        function handleMessage(data) {
            if (data === "LOGIN_SUCCESS") {
                document.getElementById('login-screen').style.display = 'none';
            } else if (data.startsWith("CHAT:")) {
                addBubble(data.substring(5), false);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("PRIVATE_CHAT:")) {
                addBubble(data.substring(13), true);
                document.getElementById('ting').play().catch(() => { });
            } else if (data.startsWith("UPDATE_USER_LIST:")) {
                updateList(data.substring(17));
            } else if (data.startsWith("SYSTEM_TYPING:")) {
                showTyping(data.substring(14));
            }
        }

        function updateList(list) {
            const users = list.split(',').filter(u => u && u !== myName);
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item' + (targetUser === u ? ' selected' : '');
                div.innerHTML = `<div class="status-dot"></div> ${u}`;
                div.onclick = () => {
                    targetUser = (targetUser === u) ? null : u;
                    updateUI();
                    updateList(list);
                };
                container.appendChild(div);
            });
        }

        function updateUI() {
            const notice = document.getElementById('private-notice');
            const btn = document.getElementById('send-btn');
            if (targetUser) {
                notice.style.display = 'block';
                document.getElementById('target-name').innerText = targetUser;
                btn.style.background = 'var(--private-mode)';
            } else {
                notice.style.display = 'none';
                btn.style.background = 'var(--primary)';
            }
        }

        function addBubble(msg, isPrivate) {
            const container = document.getElementById('messages');
            const row = document.createElement('div');

            let time = "00:00", sender = "Hệ thống", body = msg;
            const m = msg.match(/^\[(.*?)\] \[(.*?)\]: (.*)/);
            if (m) { time = m[1]; sender = m[2]; body = m[3]; }

            row.className = 'bubble-row ' + (sender === myName ? 'me' : (sender === "Hệ thống" ? 'sys' : 'other'));
            if (isPrivate) row.classList.add('private');

            row.innerHTML = `<div style="display:flex; flex-direction:column">
                <div class="bubble-meta">${sender !== "Hệ thống" ? sender + " • " + time : ""}</div>
                <div class="bubble">${body}</div>
            </div>`;

            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;
            if (targetUser) ws.send("PRIVATE:" + targetUser + "|" + val);
            else ws.send("MSG:" + val);
            input.value = "";
            document.getElementById('emoji-picker').style.display = 'none';
            document.getElementById('emoji-toggle').style.filter = 'grayscale(1)';
        }

        function sendTyping() { ws.send("TYPING:1"); }
        function showTyping(u) {
            const box = document.getElementById('typing-box');
            box.innerText = u + " đang soạn...";
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => box.innerText = "", 2000);
        }
        function toggleEmoji() {
            const p = document.getElementById('emoji-picker');
            const toggle = document.getElementById('emoji-toggle');
            if (p.style.display === 'grid') {
                p.style.display = 'none';
                toggle.style.filter = 'grayscale(1)';
            } else {
                p.style.display = 'grid';
                toggle.style.filter = 'grayscale(0)';
            }
        }
        function addEmoji(e) {
            document.getElementById('msg-input').value += e;
            document.getElementById('msg-input').focus();
        }
    </script>
</body>

</html>
