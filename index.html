<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Cloud Chat Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --me-bubble: #4338ca;
            --other-bubble: #334155;
            --private-mode: #be185d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f1f5f9;
            /* Nền trang web giả định */
            margin: 0;
            padding: 0;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
        }

        /* NÚT CHAT HEAD (FLOATING BUTTON) */
        #chat-launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #chat-launcher:hover {
            transform: scale(1.1) rotate(5deg);
        }

        #chat-launcher svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        /* CỬA SỔ CHAT TRỊNH TRỌNG (WIDGET WINDOW) */
        #app-container {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 420px;
            height: 600px;
            background: var(--surface);
            border-radius: 24px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sidebar & Main */
        #app-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #sidebar {
            width: 120px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        #user-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
        }

        .user-item {
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8em;
            margin-bottom: 5px;
            text-align: center;
            color: var(--text-dim);
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-item.selected {
            background: var(--private-mode);
            color: white;
        }

        #chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0b1120;
            position: relative;
        }

        /* Message Area */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #typing-indicator {
            font-size: 0.75em;
            color: #10b981;
            padding: 0 15px 10px;
            font-style: italic;
            display: none;
        }

        /* Bong bóng chat tinh tế */
        .bubble-row {
            display: flex;
            width: 100%;
        }

        .bubble-row.me {
            justify-content: flex-end;
        }

        .bubble-row.other {
            justify-content: flex-start;
        }

        .bubble-row.sys {
            justify-content: center;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9em;
            position: relative;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .me .bubble {
            background: var(--me-bubble);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .other .bubble {
            background: var(--other-bubble);
            color: white;
            border-bottom-left-radius: 2px;
        }

        .sys .bubble {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            font-size: 0.75rem;
            border-radius: 8px;
        }

        .private .bubble {
            background: var(--private-mode) !important;
        }

        /* Header */
        header {
            padding: 15px 20px;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        header h3 {
            margin: 0;
            font-size: 1.1em;
            color: white;
        }

        .close-btn {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
        }

        /* Input area */
        #controls {
            padding: 15px;
            background: #1e293b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        #private-label {
            background: var(--private-mode);
            font-size: 0.7em;
            padding: 3px 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: none;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        #login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        #emoji-grid {
            position: absolute;
            bottom: 80px;
            left: 15px;
            background: var(--surface);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 1002;
        }
    </style>
</head>

<body>

    <!-- PHẦN TRANG WEB GIẢ ĐỊNH -->
    <div style="padding: 100px; text-align: center;">
        <h1>Chào mừng tới Trang Web của tôi</h1>
        <p>Bấm vào biểu tượng Chat ở góc dưới bên phải để bắt đầu!</p>
    </div>

    <!-- NÚT CHAT HEAD -->
    <div id="chat-launcher" onclick="toggleChat()">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
        </svg>
    </div>

    <!-- CỬA SỔ CHAT -->
    <div id="app-container">
        <header>
            <h3>CPS Cloud Chat</h3>
            <div class="close-btn" onclick="toggleChat()">✖</div>
        </header>

        <div id="app-content">
            <!-- ĐĂNG NHẬP -->
            <div id="login-overlay">
                <h2>👋 Xin chào!</h2>
                <p style="font-size: 0.9em; color: var(--text-dim)">Vui lòng nhập tên để trò chuyện</p>
                <input type="text" id="user-in" placeholder="Họ tên của bạn..."
                    style="width:100%; padding: 12px; margin: 20px 0; border-radius: 8px; border:1px solid #334155; background:#0f172a; color:white;">
                <button onclick="login()" style="width:100%">Bắt đầu</button>
            </div>

            <div id="sidebar">
                <div class="sidebar-header">Online</div>
                <div id="user-list"></div>
            </div>

            <div id="chat-main">
                <div id="messages-container"></div>
                <div id="typing-indicator"></div>

                <div id="emoji-grid">
                    <span onclick="addEmoji('😊')" style="cursor:pointer">😊</span>
                    <span onclick="addEmoji('😂')" style="cursor:pointer">😂</span>
                    <span onclick="addEmoji('❤️')" style="cursor:pointer">❤️</span>
                    <span onclick="addEmoji('👍')" style="cursor:pointer">👍</span>
                    <span onclick="addEmoji('🔥')" style="cursor:pointer">🔥</span>
                    <span onclick="addEmoji('🎉')" style="cursor:pointer">🎉</span>
                    <span onclick="addEmoji('✨')" style="cursor:pointer">✨</span>
                    <span onclick="addEmoji('🚀')" style="cursor:pointer">�</span>
                </div>

                <div id="controls">
                    <div id="private-label">🔒 Đang chat riêng với <span id="target-name"></span></div>
                    <div class="input-row">
                        <span onclick="toggleEmoji()" style="cursor:pointer; font-size: 1.4em">😊</span>
                        <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." oninput="sendTyping()"
                            onkeypress="if(event.key==='Enter') send()">
                        <button onclick="send()">Gửi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="ting-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        let ws, myName = "", targetUser = null, tTimer;
        // KIỂM TRA LẠI URL CỦA BẠN
        const URL = "wss://my-chat-app-2a1d.onrender.com";

        function toggleChat() {
            const app = document.getElementById('app-container');
            app.style.display = (app.style.display === 'flex') ? 'none' : 'flex';
        }

        function login() {
            myName = document.getElementById('user-in').value.trim();
            if (myName) {
                ws = new WebSocket(URL);
                ws.onopen = () => ws.send("LOGIN:" + myName);
                ws.onmessage = (e) => handle(e.data);
            }
        }

        function handle(data) {
            if (data === "LOGIN_SUCCESS") {
                document.getElementById('login-overlay').style.display = 'none';
            } else if (data.startsWith("CHAT:")) {
                addMsg(data.substring(5), false);
                document.getElementById('ting-sound').play().catch(() => { });
            } else if (data.startsWith("PRIVATE_CHAT:")) {
                addMsg(data.substring(13), true);
                document.getElementById('ting-sound').play().catch(() => { });
            } else if (data.startsWith("UPDATE_USER_LIST:")) {
                updateUsers(data.substring(17));
            } else if (data.startsWith("SYSTEM_TYPING:")) {
                showT(data.substring(14));
            }
        }

        function updateUsers(list) {
            const users = list.split(',').filter(u => u && u !== myName);
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item' + (targetUser === u ? ' selected' : '');
                div.innerText = u;
                div.onclick = () => {
                    targetUser = (targetUser === u) ? null : u;
                    const label = document.getElementById('private-label');
                    label.style.display = targetUser ? 'block' : 'none';
                    if (targetUser) document.getElementById('target-name').innerText = targetUser;
                    updateUsers(list);
                };
                container.appendChild(div);
            });
        }

        function addMsg(full, isP) {
            const container = document.getElementById('messages-container');
            const row = document.createElement('div');

            let time = "", sender = "Hệ thống", body = full;
            const m = full.match(/^\[(.*?)\] \[(.*?)\]: (.*)/);
            if (m) { time = m[1]; sender = m[2]; body = m[3]; }

            row.className = 'bubble-row ' + (sender === myName ? 'me' : (sender === "Hệ thống" ? 'sys' : 'other'));
            if (isP) row.classList.add('private');

            row.innerHTML = `<div style="display:flex; flex-direction:column; max-width:85%; ${sender === myName ? 'align-items:flex-end' : ''}">
                ${sender !== "Hệ thống" ? `<span style="font-size:0.7em; color:var(--text-dim); margin:0 5px">${sender} • ${time}</span>` : ''}
                <div class="bubble">${body}</div>
            </div>`;

            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            if (targetUser) ws.send("PRIVATE:" + targetUser + "|" + input.value);
            else ws.send("MSG:" + input.value);
            input.value = "";
            document.getElementById('emoji-grid').style.display = 'none';
        }

        function sendTyping() { ws.send("TYPING:1"); }
        function showT(u) {
            const ind = document.getElementById('typing-indicator');
            ind.innerText = u + " đang soạn tin...";
            ind.style.display = 'block';
            clearTimeout(tTimer);
            tTimer = setTimeout(() => ind.style.display = 'none', 2000);
        }
        function toggleEmoji() {
            const grid = document.getElementById('emoji-grid');
            grid.style.display = (grid.style.display === 'grid') ? 'none' : 'grid';
        }
        function addEmoji(e) { document.getElementById('msg-input').value += e; }
    </script>
</body>

</html>
