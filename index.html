<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Cloud Chat - Web Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #chat-container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #status-dot {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ef4444;
        }

        #status-dot.online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        #main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #user-list {
            width: 200px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            font-size: 0.9em;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 10px 16px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.5;
        }

        .msg.system {
            color: #94a3b8;
            font-style: italic;
            align-self: center;
            font-size: 0.85em;
        }

        .msg.user {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-start;
        }

        .msg.me {
            background: var(--primary);
            align-self: flex-end;
        }

        #input-area {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Login Modal */
        #login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 350px;
        }
    </style>
</head>

<body>

    <div id="login-modal">
        <div class="login-box">
            <h2 style="margin-top: 0">Sẵn sàng Chat?</h2>
            <p style="color: #94a3b8; font-size: 0.9em">Nhập tên của bạn để bắt đầu</p>
            <input type="text" id="username-input" placeholder="Tên của bạn..." style="width: 80%; margin-bottom: 20px">
            <br>
            <button onclick="startChat()" style="width: 90%; height: 50px">Tham gia ngay</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="header">
            <div style="font-size: 1.2em; font-weight: 600">CPS Cloud Messenger</div>
            <div style="font-size: 0.9em">
                <span id="status-dot"></span>
                <span id="status-text">Đang kết nối...</span>
            </div>
        </div>
        <div id="main-content">
            <div id="user-list">
                <div style="margin-bottom: 15px; color: #6366f1; font-weight: 600">ONLINE</div>
                <div id="users"></div>
            </div>
            <div id="messages"></div>
        </div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." onkeypress="handleKey(event)">
            <button onclick="send()">Gửi</button>
        </div>
    </div>

    <script>
        let ws;
        let username = "";
        // THAY ĐỊA CHỈ NÀY BẰNG LINK RENDER CỦA BẠN
        const SERVER_URL = "wss://my-chat-app-2a1d.onrender.com";

        function startChat() {
            username = document.getElementById('username-input').value.trim();
            if (!username) return alert("Vui lòng nhập tên!");

            connect();
        }

        function connect() {
            ws = new WebSocket(SERVER_URL);

            ws.onopen = () => {
                ws.send("LOGIN:" + username);
            };

            ws.onmessage = (e) => {
                const data = e.data;
                if (data === "LOGIN_SUCCESS") {
                    document.getElementById('login-modal').style.display = 'none';
                    document.getElementById('status-dot').className = 'online';
                    document.getElementById('status-text').innerText = "Đã kết nối Cloud";
                } else if (data.startsWith("CHAT:")) {
                    addMsg(data.substring(5));
                } else if (data.startsWith("UPDATE_USER_LIST:")) {
                    updateUsers(data.substring(17));
                } else if (data.startsWith("ERROR:")) {
                    alert(data.substring(6));
                    ws.close();
                }
            };

            ws.onclose = () => {
                document.getElementById('status-dot').className = '';
                document.getElementById('status-text').innerText = "Mất kết nối";
                setTimeout(connect, 3000); // Tự động kết nối lại
            };
        }

        function addMsg(text) {
            const div = document.createElement('div');
            if (text.includes("***")) {
                div.className = 'msg system';
                div.innerText = text;
            } else {
                div.className = 'msg user';
                // Kiểm tra nếu là tin nhắn của mình
                if (text.includes("[" + username + "]:")) div.className = 'msg me';
                div.innerText = text;
            }
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateUsers(list) {
            const container = document.getElementById('users');
            container.innerHTML = list.split(',').filter(u => u).join('<br>');
        }

        function send() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                ws.send("MSG:" + input.value);
                input.value = "";
            }
        }

        function handleKey(e) { if (e.key === 'Enter') send(); }
    </script>
</body>

</html>
